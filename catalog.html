<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="catalog-page">
    <header class="catalog-header">
      <h1>Product Catalog</h1>
      <p>Browse our available products below.</p>
    </header>

    <main class="catalog-grid">
      <div class="catalog-card">
        <img src="bluebottle.png" alt="Product 1">
        <h2>Product One</h2>
        <p>A clean and practical product designed for everyday use.</p>
        <a href="index.html" class="catalog-button">View Product</a>
      </div>

      <div class="catalog-card">
        <img src="cuvette.png" alt="Product 2">
        <h2>Product Two</h2>
        <p>A stylish option with a simple design and premium presentation.</p>
        <a href="index2.html" class="catalog-button">View Product</a>
      </div>
    </main>
  </div>
</body>
</html>
